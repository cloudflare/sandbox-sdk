shared:
  - 'packages/shared/**'
sdk:
  - 'packages/sandbox/src/**'
  - 'packages/sandbox/package.json'
container:
  - 'packages/sandbox-container/**'
  - 'packages/sandbox-execution/**'
docker-config:
  - 'packages/sandbox/Dockerfile'
  - 'docker-bake.hcl'
  - 'docker-images.txt'
  - '.dockerignore'
  - '.bun-version'
build-config:
  - 'tooling/**'
  - 'turbo.json'
  - '.npmrc'
  - 'biome.json'
e2e-tests:
  - 'tests/e2e/**'
  - 'vitest.e2e.config.ts'
ci-config:
  - '.github/path-filters.yml'
  - '.github/quality-config.test.ts'
  - '.github/test-release-tools.sh'
  - '.github/workflows/pr.yml'
  - '.github/workflows/reusable-quality.yml'
  - '.github/workflows/reusable-e2e.yml'
  - '.github/workflows/pr-privileged.yml'
deps:
  - 'package.json'
  - 'package-lock.json'
  - 'packages/*/package.json'
changesets:
  - '.changeset/**'
any-source:
  - 'packages/**'
  - 'tests/**'
