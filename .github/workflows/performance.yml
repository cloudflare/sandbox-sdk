name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cold-start
          - sustained-throughput
          - bursty-traffic
          - concurrent-creation
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read
  id-token: write

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

env:
  CF_ACCOUNT_SUBDOMAIN: agents-b8a
  PERF_WORKER_NAME: sandbox-perf-test-worker

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit --no-fund

      - name: Setup Turbo remote cache
        uses: rharkor/caching-for-turbo@v1
        with:
          cache-prefix: turbo-

      - name: Build packages
        run: npx turbo run build

      - name: Get package version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/sandbox/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ github.sha }}
          path: |
            packages/sandbox/dist/
            packages/shared/dist/
          retention-days: 1

      - uses: docker/setup-buildx-action@v3

      - name: Login to CF registry (for cache)
        run: echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | docker login registry.cloudflare.com -u unused --password-stdin

      - name: Build default Docker image
        uses: docker/bake-action@v6
        env:
          TAG: perf
          SANDBOX_VERSION: ${{ steps.version.outputs.version }}
          CF_REGISTRY: registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          files: docker-bake.hcl
          targets: default
          load: true

      - name: Push image to CF registry
        run: wrangler containers push sandbox:perf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate wrangler config
        run: |
          cd tests/e2e/test-worker
          sed "s/{{WORKER_NAME}}/${{ env.PERF_WORKER_NAME }}/g; s/{{CONTAINER_NAME}}/${{ env.PERF_WORKER_NAME }}/g" \
            wrangler.perf.template.jsonc > wrangler.jsonc

      - name: Deploy test worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ env.PERF_WORKER_NAME }}
          workingDirectory: tests/e2e/test-worker

      - name: Set worker URL
        id: deploy
        run: |
          echo "worker_url=https://${{ env.PERF_WORKER_NAME }}.${{ env.CF_ACCOUNT_SUBDOMAIN }}.workers.dev" >> $GITHUB_OUTPUT

  performance-tests:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit --no-fund

      - uses: actions/download-artifact@v5
        with:
          name: build-${{ github.sha }}

      - name: Create output directory
        run: mkdir -p perf-results

      - name: Run performance tests
        env:
          TEST_WORKER_URL: ${{ needs.setup.outputs.worker_url }}
          CI: true
        run: |
          if [ "${{ inputs.scenario }}" = "all" ] || [ -z "${{ inputs.scenario }}" ]; then
            npm run test:perf
          else
            npx vitest run --config vitest.perf.config.ts "tests/perf/scenarios/${{ inputs.scenario }}.test.ts"
          fi

      - name: Upload performance results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: perf-results-${{ github.run_id }}
          path: perf-results/
          retention-days: 7

      - name: Upload baseline
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: perf-baseline
          path: perf-results/latest.json
          retention-days: 7
