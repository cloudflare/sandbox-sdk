name: Release

on:
  push:
    branches:
      - main
      - next

# Serialize releases per branch so an older build cannot overwrite a newer
# Worker and container deployment after finishing out of order.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write
  packages: write

env:
  CF_ACCOUNT_SUBDOMAIN: sandbox-sdk-ci

jobs:
  # --- Prerelease channels ---
  prerelease:
    if: ${{ github.repository_owner == 'cloudflare' && github.ref == 'refs/heads/next' }}
    uses: ./.github/workflows/reusable-prerelease.yml
    permissions:
      id-token: write
      contents: read
      actions: read
      pull-requests: read
      packages: write
    with:
      channel: next
      prerelease_identifier: next
      base_bump: minor
      worker_name_prefix: sandbox-e2e-test-worker-next
      publish_docker_alias: true
    secrets: inherit

  # --- Compute content hashes for stable releases ---
  hashes:
    if: ${{ github.repository_owner == 'cloudflare' && github.ref == 'refs/heads/main' }}
    concurrency:
      group: release-hashes-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 1
    outputs:
      docker: ${{ steps.compute.outputs.docker }}
      deploy: ${{ steps.compute.outputs.deploy }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Compute content hashes
        id: compute
        run: |
          echo "docker=${{ hashFiles(
            'packages/sandbox/Dockerfile',
            'docker-bake.hcl',
            'docker-images.txt',
            '.dockerignore',
            'package-lock.json',
            'package.json',
            'turbo.json',
            'packages/*/package.json',
            'packages/shared/**',
            'packages/sandbox-container/**',
            'tooling/typescript-config/**',
            'biome.json',
            '.bun-version',
            'tests/e2e/test-worker/Dockerfile.*'
          ) }}" >> "$GITHUB_OUTPUT"
          echo "deploy=${{ hashFiles(
            'packages/sandbox/Dockerfile',
            'docker-bake.hcl',
            'docker-images.txt',
            '.dockerignore',
            'package-lock.json',
            'package.json',
            'turbo.json',
            'packages/*/package.json',
            'packages/shared/**',
            'packages/sandbox-container/**',
            'tooling/typescript-config/**',
            'biome.json',
            '.bun-version',
            'tests/e2e/test-worker/Dockerfile.*',
            'packages/sandbox/src/**',
            'tests/e2e/test-worker/**',
            'vitest.e2e.config.ts',
            '.github/workflows/release.yml',
            '.github/workflows/reusable-e2e.yml'
          ) }}" >> "$GITHUB_OUTPUT"

  # --- Build (always runs everything on stable release) ---
  build:
    needs: hashes
    if: ${{ github.repository_owner == 'cloudflare' && github.ref == 'refs/heads/main' }}
    concurrency:
      group: release-build-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-build.yml
    with:
      skip_docker: false
      image_tag: main
      docker_hash: ${{ needs.hashes.outputs.docker }}
    secrets: inherit

  # --- Quality gates (all checks on release) ---
  quality:
    needs: build
    if: ${{ github.repository_owner == 'cloudflare' && github.ref == 'refs/heads/main' }}
    concurrency:
      group: release-quality-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-quality.yml
    with:
      run_sdk_tests: true
      run_container_tests: true
      run_changeset_validation: false
    secrets: inherit

  # --- E2E tests ---
  e2e:
    needs: [hashes, build]
    if: ${{ github.repository_owner == 'cloudflare' && github.ref == 'refs/heads/main' }}
    concurrency:
      group: release-e2e-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      actions: read
      pull-requests: read
    uses: ./.github/workflows/reusable-e2e.yml
    with:
      worker_name_prefix: sandbox-e2e-test-worker-main
      image_tag: ci-${{ needs.hashes.outputs.docker }}
      deploy_hash: ${{ needs.hashes.outputs.deploy }}
    secrets: inherit

  # --- Publish release (after all gates pass) ---
  publish-release:
    needs: [hashes, build, quality, e2e]
    if: ${{ github.repository_owner == 'cloudflare' && github.ref == 'refs/heads/main' }}
    concurrency:
      group: release-publish-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - uses: actions/cache/restore@v5
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            examples/*/node_modules
            sites/*/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --prefer-offline --no-audit --no-fund
        if: steps.nm-cache.outputs.cache-hit != 'true'

      - uses: actions/download-artifact@v8
        with:
          name: build-${{ github.sha }}
          path: packages
      - name: Install crane
        run: .github/install-crane.sh

      - name: Login to registries
        run: .github/login-release-registries.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: changesets
        uses: changesets/action@v1
        with:
          version: npx tsx .github/changeset-version.ts
          publish: npx tsx .github/changeset-publish.ts
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: true

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          repository: cloudflare/sandbox
          readme-filepath: ./DOCKER_README.md
          short-description: ${{ github.event.repository.description }}

      - name: Publish Docker images to Docker Hub
        if: steps.changesets.outputs.published == 'true'
        run: |
          .github/publish-sandbox-images.sh \
            --source-tag "ci-${{ needs.hashes.outputs.docker }}" \
            --version "${{ needs.build.outputs.version }}" \
            --docker-hub

      - name: Publish Docker images to CF Registry Library
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        id: library-publish
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if ! .github/publish-sandbox-images.sh \
            --source-tag "ci-${{ needs.hashes.outputs.docker }}" \
            --version "$VERSION" \
            --cf-library; then
            echo "::warning::Some images failed to publish to CF Registry Library"
            {
              echo "## ⚠️ CF Registry Library publish partially failed"
              echo "Some sandbox images could not be copied to \`registry.cloudflare.com/library/\`."
              echo "Docker Hub publish was not affected."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          {
            echo "## ✅ CF Registry Library publish succeeded"
            printf "Published \`registry.cloudflare.com/library/sandbox:%s\` (+ variants)\n" "$VERSION"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Warn if library publish failed
        if: steps.library-publish.outcome == 'failure'
        run: |
          echo "::warning::CF Registry Library publish failed — Docker Hub and npm releases are unaffected"

      - name: Extract standalone binaries
        if: steps.changesets.outputs.published == 'true'
        run: |
          REGISTRY="registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          HASH="${{ needs.hashes.outputs.docker }}"
          SRC_TAG="ci-${HASH}"
          # Default variant
          docker pull "${REGISTRY}/sandbox:${SRC_TAG}"
          CID=$(docker create "${REGISTRY}/sandbox:${SRC_TAG}")
          docker cp "$CID":/container-server/sandbox ./sandbox-linux-x64
          docker rm "$CID"
          # Musl variant
          docker pull "${REGISTRY}/sandbox-musl:${SRC_TAG}"
          CID=$(docker create "${REGISTRY}/sandbox-musl:${SRC_TAG}")
          docker cp "$CID":/container-server/sandbox ./sandbox-linux-x64-musl
          docker rm "$CID"

      - name: Upload binaries to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          sha256sum sandbox-linux-x64 > sandbox-linux-x64.sha256
          sha256sum sandbox-linux-x64-musl > sandbox-linux-x64-musl.sha256
          gh release upload "@cloudflare/sandbox@${VERSION}" \
            ./sandbox-linux-x64 ./sandbox-linux-x64.sha256 \
            ./sandbox-linux-x64-musl ./sandbox-linux-x64-musl.sha256 \
            --clobber
